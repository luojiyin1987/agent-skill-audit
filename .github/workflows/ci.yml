name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go fmt check
        run: |
          test -z "$(gofmt -l .)"

      - name: Go test
        run: go test ./...

      - name: Run scanner fixture
        run: go run ./cmd/agent-skill-audit ./testdata/unsafe-agent
